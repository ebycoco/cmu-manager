{% load static %}

<nav class="navbar navbar-expand-lg topbar shadow-sm">
    <div class="container-fluid">
        <button class="btn btn-outline-light d-lg-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-white" href="{% url 'home' %}">
            <img src="{% static 'img/cmu-logo.png' %}" alt="Logo CMU" class="topbar-logo">
            <div class="d-flex flex-column lh-sm">
                <span>CMU Manager</span>
                <small class="topbar-subtitle">Gestion des cartes CMU</small>
            </div>
        </a>

        <div class="ms-auto d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
                <span class="text-white small d-none d-md-inline topbar-user-info">
                    {{ user.username }} — {{ user.get_role_display }}
                </span>

                <a href="{% url 'change_own_password' %}" class="btn btn-sm btn-light">
                    <i class="bi bi-key"></i> Mot de passe
                </a>

                <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-sm btn-light">
                    Connexion
                </a>
            {% endif %}
        </div>
    </div>
</nav>
