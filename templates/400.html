{% extends 'base.html' %}

{% block title %}Requête invalide{% endblock %}

{% block content %}
<div class="error-page-card text-center">
    <div class="error-code text-secondary">400</div>
    <h1 class="error-title">Requête invalide</h1>
    <p class="error-text">
        La requête envoyée n’est pas valide ou ne peut pas être traitée.
    </p>
    <div class="d-flex justify-content-center gap-2 flex-wrap">
        <a href="{% url 'home' %}" class="btn btn-primary">
            Retour à l’accueil
        </a>
    </div>
</div>
{% endblock %}
